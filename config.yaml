baseURL: "https://eraydin.net/"
title: "Aydın Eraydın"
paginate: 10
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
# googleAnalytics: UA-123-45

minify:
  disableXML: true
  minifyOutput: true

languages:
  en:
    languageName: "English"
    weight: 1
    profileMode:
      enabled: true
      title: "Hi there \U0001F44B"
      # imageUrl: "#"
      # imageTitle: my image
      # imageWidth: 120
      # imageHeight: 120
      # subtitle: "☄️ Fast | ☁️ Fluent | 🌙 Smooth | 📱 Responsive"
      subtitle: "--"
      # buttons:
      #   - name: Blog
      #     url: posts
      #   - name: Tags
      #     url: tags
    menu:
      main:
        - name: Blog
          url: posts
          weight: 10

        - name: About
          url: about
          weight: 20

        - name: Contact
          url: Contact/
          weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Aydin Eraydin - Personal Website"
  author: "Aydin Eraydin"
  # author: ["Me", "You"] # multiple authors

  defaultTheme: auto
  disableThemeToggle: false
  ShowShareButtons: true
  ShowReadingTime: true
  disableSpecial1stPost: false
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  comments: false
  images: ["papermod-cover.png"]

  profileMode:
    enabled: false
    title: "Aydin Eraydin"
    imageUrl: "#"
    imageTitle: "my image"
    # imageWidth: 120
    # imageHeight: 120
    buttons:
      - name: Archives
        url: archives
      - name: Tags
        url: tags

